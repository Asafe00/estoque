<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Página De Registro</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body class="telaregistro">
    <a href="../index.html" class="back-link">
    <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M10 12L6 8l4-4"/>
    </svg>
    Início
</a>

    <div class="container">
        <div class="form-register">
            <h1>Registro</h1>

            <form id="formRegistro" autocomplete="off" class="form">

                <div class="input-group">
                    <label for="nome">Nome</label>
                    <input type="text" id="nome" name="nome" class="input" required>
                </div>

                <div class="input-group">
                    <label for="senha">Senha</label>
                    <input type="password" id="senha" name="senha" class="input" required>
                </div>

                <button type="submit" class="btn">Registrar</button>
            </form>

            <p class="login-text">
                Já tem conta? <a href="login.html">Fazer login</a>
            </p>
        </div>
    </div>

<script type="module" src="../auth.js"></script>

<script type="module" src="../authGuard.js"></script>

</body>


</html>
