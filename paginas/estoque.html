<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estoque</title>
    <link rel="stylesheet" href="../css/style.css">

</head>

<body class="telaestoque">

<header class="topbar">
    <a href="../index.html" class="back-link">Início</a>
</header>

<div class="container">


    <div class="grid">

        <!-- FORM -->
        <div class="card">
            <h2>Adicionar produto</h2>

            <form id="formProduto" class="form">

                <div class="input-group">
                    <label for="produto">Produto</label>
                    <input type="text" id="produto" class="input" required>
                </div>

                <div class="input-group">
                    <label for="quantidade">Quantidade</label>
                    <input type="number" id="quantidade" class="input" required>
                </div>

		<div class="input-group">
                    <label for="quantidademin">Quantidade Mínima</label>
                    <input type="number" id="quantidademin" class="input" required>
                </div>

                <button type="submit" class="btn">Adicionar</button>
            </form>
        </div>

        <!-- TABELA -->
        <div class="card1">
            <div class="search-box">
            <input type="text" id="pesquisaEstoque" class="input" placeholder="Procurar produto...">
        </div>
            <div class="table-wrapper">
                <table id="tabelaEstoque">
                    <thead>
                        <tr>
                            <th>Produto</th>
                            <th>Quantidade</th>
                            <th>Ação</th>
                        </tr>
                    </thead>

                    <tbody id="listaProdutos">
                    </tbody>
                </table>
            </div>
        </div>

    </div>
</div>

<script type="module" src="../script.js"></script>

<script type="module" src="../authGuard.js"></script>

</body>

</html>
