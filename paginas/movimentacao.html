<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movimentação</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body class="telamov">

<header class="topbar">

    <div class="top-actions">
        <a href="../index.html" class="back-link">Início</a>
	
    </div>
</header>

<div class="container">

    <!-- PESQUISA -->
    <div class="card">
        <div class="search-box">
            <input type="text" id="pesquisaProduto" class="input" placeholder="Procurar produto...">
        </div>
    </div>

    <!-- TABELA -->
    <div class="card">

        <div class="table-wrapper">
            <table id="tabelaMov">
                <thead>
                    <tr>
                        <th>Produto</th>
                        <th>Quantidade</th>
                        <th>Movimentação</th>
                    </tr>
                </thead>

                <tbody id="listaMovimentacao">
                </tbody>
            </table>
        </div>
    </div>

</div>

<script type="module" src="../script.js"></script>
</body>



</html>
