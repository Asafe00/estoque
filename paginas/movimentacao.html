<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movimentação</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body class="telamov">

    <div class="top-actions">
        
        <a href="../index.html" class="back-link">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M10 12L6 8l4-4"/>
        </svg>
        Início
        </a>

        <div style="display:flex; gap:10px;">
           <button class="btn-info-popup" onclick="abrirPopup('contaFinanceira')">Conta Financeira</button>
           <button class="btn-info-popup" onclick="abrirPopup('centroCusto')">Centro de Custo</button>
        </div>
	
    </div>

<div id="overlayPopup" class="popup-overlay" onclick="fecharPopup()"></div>

<div id="popupPrincipal" class="popup-box">
    <div class="popup-header">
        <h2 id="popupTitulo"></h2>
        <button class="popup-fechar" onclick="fecharPopup()">✕</button>
    </div>
    <div class="popup-search-row">
        <input type="text" id="popupPesquisa" class="input" placeholder="Pesquisar...">
        <button class="btn-add" onclick="abrirPopupAdicionar()" title="Adicionar novo">+</button>
    </div>
    <div id="popupLista" class="popup-lista"></div>
</div>

<!-- POP-UP ADICIONAR -->
<div id="popupAdicionar" class="popup-box popup-mini">
    <div class="popup-header">
        <h2 id="popupAdicionarTitulo"></h2>
        <button class="popup-fechar" onclick="fecharPopupAdicionar()">✕</button>
    </div>
    <div class="popup-add-form">
        <input type="text" id="popupNovoNome" class="input" placeholder="Nome...">
        <button class="btn" onclick="adicionarItem()">Adicionar</button>
    </div>
</div>


<div class="container">

    <!-- PESQUISA -->
    <div class="card">
        <div class="search-box">
            <input type="text" id="pesquisaProduto" class="input" placeholder="Procurar produto...">
        </div>
    </div>

    <!-- TABELA -->
    <div class="card">

        <div class="table-wrapper">
            <table id="tabelaMov">
                <thead>
                    <tr>
                        <th>Produto</th>
                        <th>Quantidade</th>
                        <th>Movimentação</th>
			<th></th>
			<th></th>
                    </tr>
                </thead>

                <tbody id="listaMovimentacao">

                </tbody>
            </table>
        </div>
    </div>

</div>

<script type="module" src="../script.js"></script>

<script type="module" src="../authGuard.js"></script>

</body>



</html>
