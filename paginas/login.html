<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>STOQ — Acesso</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/login.css">
</head>
<body>
  <div class="bg-grid"></div>
  <div class="bg-glow"></div>

  <div class="auth-wrapper">
    <div class="brand">
      <div class="brand-icon">
        <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
          <rect x="2" y="2" width="11" height="11" rx="2" fill="var(--accent)"/>
          <rect x="15" y="2" width="11" height="11" rx="2" fill="var(--accent)" opacity="0.5"/>
          <rect x="2" y="15" width="11" height="11" rx="2" fill="var(--accent)" opacity="0.5"/>
          <rect x="15" y="15" width="11" height="11" rx="2" fill="var(--accent)"/>
        </svg>
      </div>
      <span class="brand-name">STOQ</span>
    </div>

    <div class="auth-card">
      <div class="tabs">
        <button class="tab active" id="tabLogin" onclick="switchTab('login')">Entrar</button>
        <button class="tab" id="tabRegistro" onclick="switchTab('registro')">Registrar</button>
        <div class="tab-indicator" id="tabIndicator"></div>
      </div>

      <!-- LOGIN -->
      <form id="formLogin" class="auth-form">
        <div class="field-group">
          <label>Usuário</label>
          <div class="input-wrap">
            <svg class="input-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            <input type="text" id="loginNome" placeholder="seu usuário" autocomplete="username" required />
          </div>
        </div>
        <div class="field-group">
          <label>Senha</label>
          <div class="input-wrap">
            <svg class="input-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            <input type="password" id="loginSenha" placeholder="••••••••" autocomplete="current-password" required />
          </div>
        </div>
        <button type="submit" class="btn-primary">
          <span>Acessar sistema</span>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m9 18 6-6-6-6"/></svg>
        </button>
        <div class="auth-message" id="loginMsg"></div>
      </form>

      <!-- REGISTRO -->
      <form id="formRegistro" class="auth-form hidden">
        <div class="field-group">
          <label>Nome de usuário</label>
          <div class="input-wrap">
            <svg class="input-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            <input type="text" id="nome" placeholder="escolha um usuário" required />
          </div>
        </div>
        <div class="field-group">
          <label>Senha</label>
          <div class="input-wrap">
            <svg class="input-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            <input type="password" id="senha" placeholder="mínimo 6 caracteres" required />
          </div>
        </div>
        <button type="submit" class="btn-primary">
          <span>Criar conta</span>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
        </button>
        <div class="auth-message" id="registroMsg"></div>
      </form>
    </div>

    <p class="footer-note">Sistema de Gestão de Estoque — v2.0</p>
  </div>

  <script type="module" src="/estoque/auth.js"></script>
  <script>
    function switchTab(tab) {
      const loginForm = document.getElementById('formLogin');
      const registroForm = document.getElementById('formRegistro');
      const tabLogin = document.getElementById('tabLogin');
      const tabRegistro = document.getElementById('tabRegistro');
      const indicator = document.getElementById('tabIndicator');

      if (tab === 'login') {
        loginForm.classList.remove('hidden');
        registroForm.classList.add('hidden');
        tabLogin.classList.add('active');
        tabRegistro.classList.remove('active');
        indicator.style.transform = 'translateX(0)';
      } else {
        loginForm.classList.add('hidden');
        registroForm.classList.remove('hidden');
        tabLogin.classList.remove('active');
        tabRegistro.classList.add('active');
        indicator.style.transform = 'translateX(100%)';
      }
    }
  </script>
</body>
</html>
