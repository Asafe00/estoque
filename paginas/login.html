<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Página De Login</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body class="telainicio">
    <a href="../index.html" class="back-link">
    <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M10 12L6 8l4-4"/>
    </svg>
    Início
</a>

    <div class="container">
        <div class="form-login">
            <h1>Login</h1>

            <form id="formLogin" class="form">
                
                <div class="input-group">
                    <label for="loginNome">Nome</label>
                    <input type="text" id="loginNome" class="input" required>
                </div>

                <div class="input-group">
                    <label for="loginSenha">Senha</label>
                    <input type="password" id="loginSenha" class="input" required>
                </div>

                <button type="submit" class="btn">Entrar</button>
            </form>

            <p class="register-text">
                Não tem conta? <a href="registrar.html">Registrar</a>
            </p>
        </div>
    </div>

<script type="module" src="../auth.js"></script>
<script type="module" src="../authGuard.js"></script>
</body>



</html>
